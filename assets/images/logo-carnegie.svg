<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <rect width="320" height="120" fill="#7B1C2A"/>
  <!-- Ornamental top bar -->
  <rect y="0" width="320" height="6" fill="#C8A96B"/>
  <!-- Initials block -->
  <rect x="18" y="18" width="52" height="84" rx="3" fill="#C8A96B" opacity="0.18"/>
  <text x="44" y="72" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#C8A96B" text-anchor="middle">CE</text>
  <!-- Full name -->
  <text x="84" y="46" font-family="Georgia,serif" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="start" letter-spacing="0.5">CARNEGIE ENDOWMENT</text>
  <text x="84" y="65" font-family="Georgia,serif" font-size="11.5" fill="#E8D5A3" text-anchor="start" letter-spacing="0.3">for International Peace</text>
  <!-- Bottom rule -->
  <rect x="84" y="76" width="220" height="1" fill="#C8A96B" opacity="0.5"/>
  <text x="84" y="92" font-family="Georgia,serif" font-size="9.5" fill="#D4B88A" text-anchor="start" letter-spacing="1">EST. 1910 · WASHINGTON D.C.</text>
</svg>
