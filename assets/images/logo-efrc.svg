<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <!-- French tricolor accent -->
  <rect width="320" height="120" fill="#FAFAFA"/>
  <rect x="0" y="0" width="320" height="120" fill="#1C2B5A"/>
  <!-- Tricolor stripe at top -->
  <rect x="0" y="0" width="106" height="6" fill="#002395"/>
  <rect x="107" y="0" width="106" height="6" fill="#FFFFFF"/>
  <rect x="214" y="0" width="106" height="6" fill="#ED2939"/>
  <!-- EFRC initials -->
  <rect x="14" y="20" width="58" height="80" rx="4" fill="#002395" opacity="0.35"/>
  <text x="43" y="73" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="900" fill="#FFFFFF" text-anchor="middle">EFRC</text>
  <!-- Vertical rule -->
  <rect x="84" y="22" width="1.5" height="76" fill="#FFFFFF" opacity="0.25"/>
  <!-- Full name -->
  <text x="100" y="44" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="700" fill="#A8C8FF" text-anchor="start" letter-spacing="0.5">ÉTUDES FRANÇAISES DE</text>
  <text x="100" y="60" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="700" fill="#A8C8FF" text-anchor="start" letter-spacing="0.5">RENSEIGNEMENT ET DE CYBER</text>
  <rect x="100" y="68" width="205" height="1" fill="#A8C8FF" opacity="0.35"/>
  <text x="100" y="82" font-family="Arial,Helvetica,sans-serif" font-size="8.5" fill="#7090C0" text-anchor="start" letter-spacing="0.8">Revue française de recherche</text>
</svg>
